<!-- login.html -->
<div class="login-page">
  <div class="login-container">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <i class="fas fa-cube"></i>
        </div>
        <h1>Centre Commercial</h1>
        <p>Connectez-vous à votre espace</p>
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">

        <!-- Email -->
        <div class="form-group" [class.has-error]="loginForm.submitted && !email">
          <label for="email" class="form-label">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            class="form-input"
            placeholder="exemple@mail.com"
            required
            [disabled]="isLoading">
          <small class="form-error" *ngIf="loginForm.submitted && !email">
            L'email est requis
          </small>
        </div>

        <!-- Mot de passe -->
        <div class="form-group" [class.has-error]="loginForm.submitted && !password">
          <label for="password" class="form-label">
            <i class="fas fa-lock"></i> Mot de passe
          </label>
          <div class="input-password-wrap">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              class="form-input"
              placeholder="••••••••"
              required
              [disabled]="isLoading">
            <button
              type="button"
              class="toggle-password"
              (click)="showPassword = !showPassword"
              tabindex="-1">
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
          <small class="form-error" *ngIf="loginForm.submitted && !password">
            Le mot de passe est requis
          </small>
        </div>

        <!-- Message d'erreur API -->
        <div *ngIf="errorMessage" class="login-alert">
          <i class="fas fa-exclamation-circle"></i>
          <span>{{ errorMessage }}</span>
          <button type="button" class="alert-close" (click)="errorMessage = ''">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <!-- Bouton submit -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="btn-login">
          <span *ngIf="!isLoading">
            <i class="fas fa-sign-in-alt"></i> Se connecter
          </span>
          <span *ngIf="isLoading" class="btn-loading-inner">
            <span class="btn-spinner"></span>
            Connexion en cours…
          </span>
        </button>

      </form>

      <!-- Accès par défaut -->
      <div class="default-access">
        <div class="default-access-title">
          <i class="fas fa-key"></i>
          Accès de démonstration
        </div>
        <div class="access-list">
          <div
            *ngFor="let acc of defaultAccess"
            class="access-item"
            (click)="fillCredentials(acc)"
            [title]="'Cliquer pour remplir'">
            <span class="access-role-badge" [ngClass]="acc.roleClass">
              {{ acc.role }}
            </span>
            <span class="access-email">{{ acc.email }}</span>
            <span class="access-pw">{{ acc.password }}</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <p>Pas encore de compte ?
          <a (click)="goToRegister()" class="login-link">S'inscrire</a>
        </p>
      </div>

    </div>

    <!-- Décoration arrière-plan -->
    <div class="login-bg-decoration"></div>
  </div>
</div>
